name: Deploy to Upsun

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Step 2: Install Upsun CLI
      - name: Install Upsun CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/platformsh/cli/main/installer.sh | bash
          echo "$HOME/bin" >> $GITHUB_PATH

      # ✅ Step 3: Authenticate using API token (CORRECT METHOD)
      - name: Authenticate to Upsun
        env:
          PLATFORM_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
        run: |
          platform auth:api-token-login

      # ✅ Step 4: Deploy to Upsun
      - name: Deploy to Upsun
        run: |
          platform push --yes
